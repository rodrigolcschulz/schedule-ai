services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      BUSINESS_DOMAIN: dental
      SCHEDULE_PERSISTENCE: postgres
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: schedule_ai
      PGUSER: schedule_ai
      PGPASSWORD: schedule_ai
      # Cloud: necessário para validação de webhook da Meta
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-cloud}
      # Use o mesmo valor no campo "Verificar token" da tela de Webhooks da Meta
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-dev_verify_token_change_me}
      # Placeholders para permitir bootstrap em ambiente local (trocar pelos reais quando validar número)
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-dev_placeholder_access_token}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-dev_placeholder_phone_number_id}
      # Node não fala mais direto com o Ollama — fala com o serviço python-ai
      AI_BASE_URL: http://python-ai:8001
    expose:
      - "3001"
    # Descomente para testar a API direto no host (curl, Postman)
    ports:
      - "3001:3001"
    depends_on:
      - python-ai
      - postgres

  python-ai:
    build:
      context: ./python-ai
      dockerfile: Dockerfile
    environment:
      PORT: "8001"
      LLM_PROVIDER: ollama
      # Ollama no host (Docker Desktop / Linux com host-gateway)
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1
      MEMORY_BACKEND: sqlite
      MEMORY_SQLITE_PATH: /app/data/memory.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8001"
    # Descomente para testar o python-ai direto no host (curl, /ai/health)
    ports:
      - "8001:8001"
    volumes:
      - python_ai_data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: schedule_ai
      POSTGRES_USER: schedule_ai
      POSTGRES_PASSWORD: schedule_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
  python_ai_data: